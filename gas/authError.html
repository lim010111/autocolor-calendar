<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><?= t('auth.error.title', null, locale) ?></title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 48px 24px; color: #202124; max-width: 520px; margin: 0 auto; }
    h2 { margin: 0 0 12px; font-size: 20px; text-align: center; }
    .badge { display: block; text-align: center; margin-bottom: 16px; }
    .badge span { display: inline-block; background: #fce8e6; color: #c5221f; padding: 4px 10px; border-radius: 999px; font-size: 12px; }
    .message { background: #f8f9fa; border-left: 3px solid #c5221f; padding: 12px 16px; margin: 16px 0; border-radius: 4px; }
    .message p { margin: 0 0 6px; line-height: 1.5; color: #3c4043; font-size: 14px; }
    .message p:last-child { margin-bottom: 0; }
    .hint { text-align: center; color: #5f6368; font-size: 13px; margin-top: 20px; line-height: 1.5; }
    code { background: #f1f3f4; padding: 1px 6px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="badge"><span><?= t('auth.error.badge', null, locale) ?></span></div>
  <h2><?= t('auth.error.heading', null, locale) ?></h2>
  <div class="message" id="message-box">
    <p id="primary-message"><?= t('auth.error.default.primary', null, locale) ?></p>
    <p id="secondary-message"><?= t('auth.error.default.secondary', null, locale) ?></p>
  </div>
  <p class="hint"><?!= t('auth.error.hint', null, locale) ?></p>

  <script>
    // Locale-resolved error catalog injected by the doGet HtmlTemplate. Keys
    // mirror `OAuthErrorCode` in src/config/constants.ts. `__unknown` is the
    // fallback for codes we don't ship a translation for; `__codeSuffix` is
    // " (code: __CODE__)" with __CODE__ to be substituted client-side.
    var ERROR_BUNDLE = <?!= JSON.stringify(errorBundle) ?>;

    function renderMessage(code) {
      var entry = ERROR_BUNDLE[code] || ERROR_BUNDLE.__unknown;
      var primaryEl = document.getElementById('primary-message');
      var secondaryEl = document.getElementById('secondary-message');
      var suffix = code ? (ERROR_BUNDLE.__codeSuffix || '').replace('__CODE__', code) : '';
      primaryEl.textContent = entry.primary + suffix;
      secondaryEl.textContent = entry.secondary;
    }

    // doGet serves this page when ?token= is absent. The original request
    // URL — and its ?error= param — is visible to this iframe via
    // google.script.url.getLocation, which is the supported way to read
    // query params from the sandboxed container.
    if (typeof google !== 'undefined' && google.script && google.script.url) {
      google.script.url.getLocation(function (location) {
        var code = (location && location.parameter && location.parameter.error) || '';
        renderMessage(code);
      });
    } else {
      renderMessage('');
    }
  </script>
</body>
</html>
