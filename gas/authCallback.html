<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><?= t('auth.callback.title', null, locale) ?></title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-align: center; padding: 48px 24px; color: #202124; }
    h2 { margin: 0 0 12px; font-size: 20px; }
    p { margin: 6px 0; color: #5f6368; font-size: 14px; line-height: 1.5; }
    .badge { display: inline-block; background: #e6f4ea; color: #137333; padding: 4px 10px; border-radius: 999px; font-size: 12px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="badge"><?= t('auth.callback.badge', null, locale) ?></div>
  <h2><?= t('auth.callback.heading', null, locale) ?></h2>
  <p><?= t('auth.callback.body1', null, locale) ?></p>
  <p><?= t('auth.callback.body2', null, locale) ?></p>

  <script>
    // Drop ?token= from the iframe/tab URL immediately so it stops leaking
    // via Referer / browser history / any in-page link click. The token is
    // already persisted server-side (doGet -> UserProperties) by the time
    // this page renders, so removing it from the URL is safe.
    try {
      if (window.history && typeof window.history.replaceState === 'function') {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    } catch (err) { /* same-origin restrictions — best-effort only */ }

    // Try to close the tab; works when the OAuth flow opened it as a popup
    // or new tab. If blocked by the browser, the visible message above
    // instructs the user to close it manually.
    setTimeout(function () {
      try { window.top.close(); } catch (err) { /* ignore */ }
      try { window.close(); } catch (err) { /* ignore */ }
    }, 1500);
  </script>
</body>
</html>
