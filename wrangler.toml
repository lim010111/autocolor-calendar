name = "autocolor"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Env blocks (dev/prod) are finalized in Step 6 (secrets + custom domain).
# For now, local `wrangler dev --env dev` uses only the minimal dev shell below.

[env.dev]
name = "autocolor-dev"

[env.dev.vars]
ENV = "dev"

[env.prod]
name = "autocolor-prod"

[env.prod.vars]
ENV = "prod"
