name = "autocolor"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Env blocks (dev/prod) are finalized in Step 6 (secrets + custom domain).
# For now, local `wrangler dev --env dev` uses only the minimal dev shell below.

[env.dev]
name = "autocolor-dev"

[env.dev.vars]
ENV = "dev"
GOOGLE_OAUTH_REDIRECT_URI = "https://autocolor-dev.autocolor-lim.workers.dev/oauth/google/callback"

# Cron triggers — scoped to `[env.dev.triggers]` deliberately.
# TOML doesn't nest tables by indentation: `[triggers]` at any offset is a
# top-level table and would apply to `env.prod` too, which has no Hyperdrive
# binding — `scheduled()` → `getDb(env)` would crash on prod once deployed.
# Prod cron will be added as `[env.prod.triggers]` alongside prod
# Hyperdrive/Supabase (§3 후속 "Prod 환경 활성화").
#
# 1. `0 */6 * * *` — Watch channel renewal. Runs every 6 hours, giving 4
#    retry windows inside the 24h pre-expiry renewal window so a single
#    transient 429/5xx won't let a channel expire. `scheduled()` no-ops
#    when WEBHOOK_BASE_URL is unset, so dev (workers.dev, rejected by
#    Google) still fires the trigger harmlessly.
# 2. `0 3 * * *` — TOKEN_ENCRYPTION_KEY rotation batch (§3 후속). Daily
#    at 03:00 UTC ≈ 12:00 KST (off-peak). Drains rows whose
#    `token_version <> TARGET_TOKEN_VERSION` at batchSize=50 per tick;
#    operationally this rotates ≈1000 rows in ≈20 days — comfortable
#    inside a 30-day rotation window. Higher cadence (e.g. `0 */6 * * *`)
#    would 4× the drain rate at the cost of quadrupling idle-window
#    invocations; operators can hand-edit the schedule for the duration
#    of an active rotation if drain time matters more.
#
# Cron strings here MUST stay in lockstep with the `WATCH_RENEWAL_CRON` /
# `TOKEN_ROTATION_CRON` constants at the top of `src/index.ts` — that's
# how the dispatcher routes each trigger to the right handler.
[env.dev.triggers]
crons = ["0 */6 * * *", "0 3 * * *"]

[[env.dev.hyperdrive]]
binding = "HYPERDRIVE"
id = "0adfbd41c67e4225a63894c3768bb837"

[[env.dev.queues.producers]]
binding = "SYNC_QUEUE"
queue = "autocolor-sync-dev"

[[env.dev.queues.consumers]]
queue = "autocolor-sync-dev"
max_batch_size = 10
max_batch_timeout = 5
max_concurrency = 5
max_retries = 5
dead_letter_queue = "autocolor-sync-dlq-dev"

[[env.dev.queues.consumers]]
queue = "autocolor-sync-dlq-dev"
max_batch_size = 10
max_retries = 0

[env.prod]
name = "autocolor-prod"

[env.prod.vars]
ENV = "prod"
GOOGLE_OAUTH_REDIRECT_URI = "https://autocolorcal.app/oauth/google/callback"
# ↑ G1 verified 도메인. GCP prod Web Client의 Authorized redirect URIs 등록은
# G2 runbook Step 4에서 client 생성 시 같이 처리된다.
# WEBHOOK_BASE_URL은 G2 runbook Step 14에서 시크릿으로 주입한다
# (TODO.md:52 "Prod Watch API 활성화"). 이 vars 블록에 평문 작성하지 않는다.

